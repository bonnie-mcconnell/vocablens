name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest (non-Postgres suites)
        run: |
          python -m pytest -q -m "not postgres"

  postgres-required:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      VOCABLENS_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      VOCABLENS_REQUIRE_POSTGRES_TESTS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with socket.create_connection(("localhost", 5432), timeout=1):
                      print("postgres ready")
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("postgres did not become ready in time")
          PY

      - name: Pytest (Postgres required suites)
        run: |
          python -m pytest -q -m "postgres"
